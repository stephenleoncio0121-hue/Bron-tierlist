<!DOCTYPE html>
<html>
<head>
<title>Bron Tierlist Ultimate</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#050008;
  color:white;
  overflow:hidden;
}

/* BOOT */
#boot{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:99999;
}
.bootText{
  color:red;
  font-size:28px;
  text-shadow:0 0 20px red;
  animation:boot 1.5s infinite;
}
@keyframes boot{
  0%{opacity:0.2;transform:scale(0.9);}
  50%{opacity:1;transform:scale(1.1);}
  100%{opacity:0.2;transform:scale(0.9);}
}

/* PAGES */
.page{display:none;padding:15px;}
.page.active{display:block;}

/* CARD */
.card{
  background:#120000;
  padding:15px;
  border-radius:12px;
  margin:10px 0;
}

/* BUTTON */
button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ff2b2b;
  color:white;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}
td,th{
  padding:10px;
  border-bottom:1px solid #2a0000;
}

/* IP SYSTEM */
.item{
  padding:10px;
  margin:5px 0;
  background:#1a0000;
  border-radius:10px;
}
.item span{
  cursor:pointer;
  color:#ff4d4d;
}

/* PARTICLES */
.particle{
  position:fixed;
  width:6px;
  height:6px;
  background:red;
  border-radius:50%;
  animation:explode 1s forwards;
}
@keyframes explode{
  to{
    transform:translate(var(--x),var(--y));
    opacity:0;
  }
}

/* GLOW RANKS */
.glowHT{color:red;text-shadow:0 0 10px red;}
.glowLT{color:cyan;text-shadow:0 0 10px cyan;}
.combatAce{color:#00d4ff;}
.combatMaster{color:#b84dff;}
.combatGrandmaster{color:gold;}

/* CINEMATIC */
#cinematic{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:black;
  z-index:9999;
}

/* DRAG */
.dragging{opacity:0.5;}

/* GRAPH */
canvas{
  background:#0a0000;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- BOOT -->
<div id="boot">
  <div class="bootText">🔥 BRON TIERS SYSTEM</div>
  <p>Loading all MC systems...</p>
</div>

<!-- CINEMATIC -->
<div id="cinematic">
  <h1 id="cinPlayer"></h1>
  <h2 id="cinRank"></h2>
</div>

<!-- DASH -->
<div id="dash" class="page active">

  <div class="card">
    <h3>📊 ELO GRAPH</h3>
    <canvas id="graph"></canvas>
  </div>

  <div class="card">
    <h3>🏆 Leaderboard (Drag Rank)</h3>
    <table id="board"></table>
  </div>

  <div class="card">
    <h3>🌐 IP MANAGER</h3>

    <input id="ipName" placeholder="Server Name">
    <input id="ipAddr" placeholder="IP Address">
    <input id="ipPort" placeholder="Port">

    <button onclick="addServer()">Add Server</button>

    <div id="serverList"></div>
  </div>

</div>

<script>

/* BOOT */
setTimeout(()=>boot.style.display="none",2200);

/* DATA */
let players=[
 {name:"Alpha",elo:1800},
 {name:"Beta",elo:1200},
 {name:"Charlie",elo:900}
];

let servers=[];
let logs=[];

/* VOICE */
function speak(t){
 speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

/* LOGS */
function log(t){
 logs.push(t);
 console.log("LOG:",t);
}

/* PARTICLES */
function particles(){
 for(let i=0;i<25;i++){
  let p=document.createElement("div");
  p.className="particle";
  let a=Math.random()*360;
  let d=Math.random()*120;
  p.style.setProperty("--x",Math.cos(a)*d+"px");
  p.style.setProperty("--y",Math.sin(a)*d+"px");
  p.style.left="50%";
  p.style.top="50%";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),1000);
 }
}

/* COPY IP */
function copyIP(t){
 navigator.clipboard.writeText(t);
 speak("IP copied");
 log("Copied "+t);
}

/* SERVER SYSTEM */
function addServer(){
 if(!ipName.value||!ipAddr.value||!ipPort.value)return;

 servers.push({
  name:ipName.value,
  ip:ipAddr.value,
  port:ipPort.value
});

 ipName.value="";
 ipAddr.value="";
 ipPort.value="";

 renderServers();
 speak("Server added");
 log("Server added");
}

function renderServers(){
 serverList.innerHTML="";

 servers.forEach(s=>{
  serverList.innerHTML+=`
   <div class="item">
    <b>${s.name}</b><br>
    <span onclick="copyIP('${s.ip}:${s.port}')">
      ${s.ip}:${s.port} 📋
    </span>
   </div>
  `;
 });
}

/* LEADERBOARD */
function renderBoard(){
 board.innerHTML="<tr><th>Rank</th><th>Name</th><th>Elo</th></tr>";

 players.sort((a,b)=>b.elo-a.elo).forEach((p,i)=>{
  board.innerHTML+=`
   <tr draggable="true">
    <td>${i+1}</td>
    <td>${p.name}</td>
    <td>${p.elo}</td>
   </tr>
  `;
 });
}

/* GRAPH */
function drawGraph(){
 let c=graph;
 let ctx=c.getContext("2d");

 c.width=400;
 c.height=200;

 ctx.strokeStyle="red";
 ctx.beginPath();

 let data=[900,1200,1500,1800,2000];

 data.forEach((v,i)=>{
  let x=i*80;
  let y=200-(v/10);

  if(i==0)ctx.moveTo(x,y);
  else ctx.lineTo(x,y);
 });

 ctx.stroke();
}

/* INIT */
renderBoard();
renderServers();
drawGraph();

</script>

</body>
</html>
